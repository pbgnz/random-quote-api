openapi: 3.0.0
info:
  title: Random Quote API
  description: A simple API that returns random quotes from Goodreads
  version: 1.27.0
  contact:
    url: https://github.com/pbgnz/random-quote-api

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://random-quote-api.onrender.com
    description: Production server

paths:
  /api/v1/quotes:
    get:
      summary: Get quotes
      description: Returns up to 30 random quotes from Goodreads
      parameters:
        - name: count
          in: query
          description: Number of quotes to return (1-30)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
        - name: page
          in: query
          description: Specific Goodreads page to fetch (1-100). Falls back to a random page if omitted or invalid.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  quotes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quote'
              example:
                quotes:
                  - id: 0
                    quote: "The only way to do great work is to love what you do."
                    author: "Steve Jobs"
                    bookTitle: null
                    tags: ["work", "inspiration"]
        '429':
          description: Rate limit exceeded
        '500':
          description: Server error

  /api/v1/quotes/daily:
    get:
      summary: Get the quote of the day
      description: Returns a deterministic quote based on the current UTC date. The same quote is returned for all requests on the same day.
      tags:
        - Quotes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote:
                    $ref: '#/components/schemas/Quote'
                  date:
                    type: string
                    format: date
                    description: UTC date for which this quote was selected (YYYY-MM-DD)
              example:
                quote:
                  id: 42
                  quote: "In the middle of difficulty lies opportunity."
                  author: "Albert Einstein"
                  bookTitle: null
                  tags: ["difficulty", "opportunity"]
                date: "2026-05-12"
        '429':
          description: Rate limit exceeded
        '500':
          description: Server error

  /api/v1/quotes/random:
    get:
      summary: Get a single random quote
      description: Returns a single random quote from Goodreads
      parameters:
        - name: page
          in: query
          description: Specific Goodreads page to fetch (1-100). Falls back to a random page if omitted or invalid.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote:
                    $ref: '#/components/schemas/Quote'
              example:
                quote:
                  id: 42
                  quote: "Innovation distinguishes between a leader and a follower."
                  author: "Steve Jobs"
                  bookTitle: null
                  tags: ["innovation", "leadership"]
        '429':
          description: Rate limit exceeded
        '500':
          description: Server error

  /api/v1/cache/stats:
    get:
      summary: Get cache statistics
      description: Returns cache hit/miss statistics and performance metrics
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: integer
                    description: Number of cache hits
                  misses:
                    type: integer
                    description: Number of cache misses
                  expirations:
                    type: integer
                    description: Number of cache expirations
                  hitRate:
                    type: string
                    description: Hit rate percentage
                  cacheSize:
                    type: integer
                    description: Current number of cached pages
              example:
                hits: 42
                misses: 8
                expirations: 1
                hitRate: "84.00%"
                cacheSize: 3

  /health:
    get:
      summary: Health check
      description: Returns the health status of the API
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ['ok']
                  uptime:
                    type: integer
                    description: Seconds since server start
                  timestamp:
                    type: string
                    format: date-time
                    description: ISO 8601 timestamp
              example:
                status: "ok"
                uptime: 3600
                timestamp: "2026-05-10T12:30:45.123Z"

  /metrics:
    get:
      summary: Application metrics
      description: "Returns runtime metrics. Defaults to JSON; send Accept: text/plain for Prometheus text format."
      tags:
        - Monitoring
      responses:
        '200':
          description: Metrics data
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP requests_total Total HTTP requests received
                # TYPE requests_total counter
                requests_total 456
            application/json:
              schema:
                type: object
                properties:
                  uptime_seconds:
                    type: integer
                    description: Server uptime in seconds
                  requests_total:
                    type: integer
                    description: Total requests received
                  requests_by_path:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Request counts per path
                  errors_total:
                    type: integer
                    description: Total 5xx errors
                  cache:
                    type: object
                    properties:
                      hits:
                        type: integer
                      misses:
                        type: integer
                      hitRate:
                        type: string
                      cacheSize:
                        type: integer

components:
  schemas:
    Quote:
      type: object
      properties:
        id:
          type: integer
          description: Unique quote identifier
        quote:
          type: string
          description: The quote text
        author:
          type: string
          description: The author of the quote
        bookTitle:
          type: string
          nullable: true
          description: Title of the book the quote is from, or null for standalone quotes
        tags:
          type: array
          items:
            type: string
          description: Tag labels associated with the quote (e.g. "inspiration", "love")
      required:
        - id
        - quote
        - author
        - bookTitle
        - tags

tags:
  - name: Quotes
    description: Endpoints for retrieving quotes
  - name: Cache
    description: Cache management and statistics
  - name: Health
    description: API health monitoring
  - name: Monitoring
    description: Application health and metrics
